# ─────────────────────────────────────────────────────────────────────────────
# lint.yml — Static analysis (ruff check + ruff format)
# Runs on every push, pull request to main, and daily schedule.
# ─────────────────────────────────────────────────────────────────────────────

name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install 'ruff==0.15.20'

      - name: ruff check
        run: ruff check --output-format=github

      - name: ruff format
        run: ruff format --check
