# ─────────────────────────────────────────────────────────────────────────────
# ci.yml — Unit tests + Black-box e2e acceptance
#   unit: pip-installs the project and runs white-box tests (no Docker)
#   e2e:  sources verify/manifest.env to bring up the full stack via Docker
#         Compose, waits for /healthz, runs the acceptance suite, tears down.
# ─────────────────────────────────────────────────────────────────────────────

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy .env
        run: cp .env.example .env

      - name: Install docker compose
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq docker-compose-plugin

      - name: Start services
        run: |
          docker compose up --build -d
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8010/healthz > /dev/null 2>&1; then
              echo "App is ready"
              break
            fi
            echo "Waiting for app... ($i/30)"
            sleep 2
          done

      - name: Run database migrations
        run: docker compose run --rm app alembic upgrade head

      - name: Install test deps
        run: pip install 'httpx>=0.27,<1.0' 'pytest>=8.0,<9.0' 'pytest-asyncio>=0.24,<1.0'

      - name: Run acceptance tests
        run: API_BASE_URL="http://localhost:8010" python -m pytest verify/acceptance/ -v --tb=short

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs

      - name: Teardown
        if: always()
        run: docker compose down --volumes --remove-orphans
