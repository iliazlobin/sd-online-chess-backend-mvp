# ─────────────────────────────────────────────────────────────────────────────
# ci.yml — Unit tests + Black-box e2e acceptance (native, no Docker)
#   unit: pip-installs the project and runs white-box tests
#   e2e:  starts uvicorn natively against Postgres service, runs
#         migrations, waits for /healthz, runs the acceptance suite.
# ─────────────────────────────────────────────────────────────────────────────

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: chess
          POSTGRES_PASSWORD: chess
          POSTGRES_DB: chess_mvp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chess"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Run database migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: "postgresql+asyncpg://chess:chess@localhost:5432/chess_mvp"

      - name: Start app
        run: |
          uvicorn chess_mvp.main:app --host 0.0.0.0 --port 8010 > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid
        env:
          DATABASE_URL: "postgresql+asyncpg://chess:chess@localhost:5432/chess_mvp"

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8010/healthz > /dev/null 2>&1; then
              echo "App is ready"
              break
            fi
            echo "Waiting for app... ($i/30)"
            sleep 2
          done
          # Final check — fail if not ready after 60s
          curl -sf http://localhost:8010/healthz

      - name: Run acceptance tests
        run: API_BASE_URL=http://localhost:8010 python -m pytest verify/acceptance/ -v --tb=short
        env:
          DATABASE_URL: "postgresql+asyncpg://chess:chess@localhost:5432/chess_mvp"

      - name: Collect logs on failure
        if: failure()
        run: cat /tmp/app.log 2>/dev/null || echo "No app log available"
